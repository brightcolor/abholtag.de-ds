name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check apps config
      - name: Migrations check
        run: python manage_prod.py makemigrations --check --dry-run --settings=config.settings.test
      - name: Tests
        run: python -m pytest -c pyproject.toml

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t abfuhrkalender-luebeck:${{ github.ref_name }} .
