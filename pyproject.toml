[tool.ruff]
line-length = 110
target-version = "py311"
exclude = [".venv", "**/migrations/**"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "DJ", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py"]
testpaths = ["apps"]
pythonpath = ["."]
