{% extends "base_public.html" %}
{% load static %}
{% block title %}Registrieren – Abfuhrkalender Lübeck{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="bi bi-person-plus text-primary fs-1 mb-3 d-block"></i>
            <h4 class="fw-bold">Registrieren</h4>
            <p class="text-secondary small">Erstellen Sie ein kostenloses Konto</p>
          </div>
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">E-Mail-Adresse</label>
              <input type="email" name="email" class="form-control form-control-lg" placeholder="ihre@email.de" required autocomplete="email">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Anzeigename</label>
              <input type="text" name="display_name" class="form-control form-control-lg" placeholder="Ihr Name">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Passwort</label>
              <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100"><i class="bi bi-person-check me-2"></i>Konto erstellen</button>
          </form>
          <div class="text-center small text-secondary mt-3">Bereits registriert? <a href="{% url 'accounts:login' %}">Anmelden</a></div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
