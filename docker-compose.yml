services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: abfuhrkalender
      POSTGRES_USER: abfuhr
      POSTGRES_PASSWORD: abfuhr_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abfuhr"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        . /app/.venv/bin/activate && 
        python manage.py migrate --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: