{% extends "base.html" %}

{% block title %}Seite nicht gefunden – {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row"><div class="col-lg-6 mx-auto">
    <div class="ak-card"><div class="ak-card-body text-center">
      <i class="fa-solid fa-map-location-dot" style="font-size: 2.6rem; color: var(--ak-text-faint);" aria-hidden="true"></i>
      <h1 class="h4 mt-3" style="font-weight: 800;">Seite nicht gefunden</h1>
      <p style="color: var(--ak-text-muted);">
        Diese Seite existiert nicht (mehr). Vielleicht hilft die Adresssuche weiter?
      </p>
      <a href="/" class="ak-btn ak-btn-primary mt-2">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i> Zur Adresssuche
      </a>
    </div></div>
  </div></div>
</div>
{% endblock %}
