{% if query %}
<ul class="ak-suggestions" role="listbox" aria-label="Straßenvorschläge">
  {% for street in streets %}
    <li role="option">
      <button type="button"
              @click="streetId = '{{ street.pk }}'; streetLabel = '{{ street.name|escapejs }}'; open = false">
        <span>{{ street.name }}</span>
        {% if street.district %}<span class="ak-badge ak-badge-muted">{{ street.district.name }}</span>{% endif %}
      </button>
    </li>
  {% empty %}
    <li class="ak-empty">
      Keine Straße gefunden. Prüfen Sie die Schreibweise oder
      <a href="/melden/">melden Sie eine fehlende Straße</a>.
    </li>
  {% endfor %}
</ul>
{% endif %}
